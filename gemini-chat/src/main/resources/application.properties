spring.application.name=gemini-chat

gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=
gemini.api.key=${GEMINI_API_KEY:}
gemini.embedding.url=https://generativelanguage.googleapis.com/v1beta/models/text-embedding-004:embedContent?key=

# Qdrant vector database (run via docker compose)
qdrant.url=${QDRANT_URL:http://localhost:6333}
qdrant.collection=chatbot_vectors

# RAG settings — keeps token usage low on long chats
rag.recent-turns=2
rag.top-k=3

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chat}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=86400000
